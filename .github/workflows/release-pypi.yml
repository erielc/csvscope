name: PyPI Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write  # required for PyPI trusted publishing

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Verify tag matches version.txt and pyproject.toml
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TXT_VERSION=$(cat version.txt | tr -d '[:space:]')
          PROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Tag: $TAG_VERSION"
          echo "version.txt: $TXT_VERSION"
          echo "pyproject.toml: $PROJECT_VERSION"
          if [ "$TAG_VERSION" != "$TXT_VERSION" ] || [ "$TAG_VERSION" != "$PROJECT_VERSION" ]; then
            echo "::error::Version mismatch between tag, version.txt, and pyproject.toml"
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distributions
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/csvscope
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Uses trusted publishing — configure once at:
          # https://pypi.org/manage/account/publishing/
